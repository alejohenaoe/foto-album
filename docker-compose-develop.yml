services:
  foto_album_db:
    image: postgres:17-alpine
    container_name: foto_album_db_dev
    environment:
      POSTGRES_USER: foto_album
      POSTGRES_PASSWORD: foto_album_dev
      POSTGRES_DB: foto_album
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foto_album -d foto_album"]
      interval: 5s
      timeout: 5s
      retries: 5

  foto_album_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: dev.txt
    image: foto_album_backend:dev
    container_name: foto_album_backend_dev
    depends_on:
      foto_album_db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_NAME: foto_album
      DB_USER: foto_album
      DB_PASSWORD: foto_album_dev
      DB_HOST: foto_album_db
      DB_PORT: "5432"
      PGTZ: UTC
    volumes:
      - ./backend:/app
      - ./media:/media
      - ./public:/public
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  foto_album_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development-stage
    image: foto_album_frontend:dev
    container_name: foto_album_frontend_dev
    depends_on:
      - foto_album_backend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  frontend_node_modules:
